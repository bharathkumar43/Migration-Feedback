services:
  - type: web
    name: migration-feedback-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: migration-feedback-db
          property: connectionString
      - key: ZOOM_WEBHOOK_SECRET
        sync: false
      - key: ZOOM_VERIFICATION_TOKEN
        sync: false
      - key: SMTP_HOST
        value: smtp.office365.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: JIRA_PROJECT_KEY
        value: MIG
      - key: FEEDBACK_BASE_URL
        sync: false
      - key: FEEDBACK_TOKEN_SECRET
        sync: false
      - key: INTERNAL_DOMAIN
        value: cloudfuze.com

  - type: web
    name: migration-feedback-ui
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: migration-feedback-db
    plan: free
    databaseName: migration_feedback
